- Expand scope because a feature is easy to build.
- Implement code in this agent.
- Touch production, secrets, migrations, CI/CD, or deployment.

Return:
- MVP scope.
- Architecture context draft.
- Build session brief.
- Validation commands.
- Risks and approvals needed.
