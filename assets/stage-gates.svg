<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-label="AI-native startup stage gates">
  <defs>
    <style>
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #111827; }
      .stage { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 18; }
      .gate { fill: #f9fafb; stroke: #9ca3af; stroke-width: 2; rx: 14; }
      .h { font: 700 20px Inter, Arial, sans-serif; fill: #111827; }
      .s { font: 400 13px Inter, Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
  </defs>
  <rect width="1180" height="520" fill="#f3f4f6" />
  <text x="50" y="60" class="title">Stage-gated AI-native startup execution</text>

  <rect x="50" y="110" width="230" height="210" class="stage" />
  <text x="80" y="145" class="h">Idea</text>
  <text x="80" y="180" class="s">Question: Is this worth building?</text>
  <text x="80" y="205" class="s">Evidence: real problem, real people,</text>
  <text x="80" y="225" class="s">specific frequency/severity, alternatives.</text>
  <text x="80" y="260" class="s">Primary skills:</text>
  <text x="80" y="282" class="s">idea-validation, customer-discovery</text>

  <rect x="320" y="110" width="230" height="210" class="stage" />
  <text x="350" y="145" class="h">MVP</text>
  <text x="350" y="180" class="s">Question: What exactly should we build first?</text>
  <text x="350" y="205" class="s">Evidence: focused product, scope,</text>
  <text x="350" y="225" class="s">architecture context, PMF metrics.</text>
  <text x="350" y="260" class="s">Primary skills:</text>
  <text x="350" y="282" class="s">mvp-scope, ai-coding-context, pmf-loop</text>

  <rect x="590" y="110" width="230" height="210" class="stage" />
  <text x="620" y="145" class="h">Launch</text>
  <text x="620" y="180" class="s">Question: Can the business grow safely?</text>
  <text x="620" y="205" class="s">Evidence: repeatable channel, hardened</text>
  <text x="620" y="225" class="s">infra, no founder bottleneck.</text>
  <text x="620" y="260" class="s">Primary skills:</text>
  <text x="620" y="282" class="s">launch-readiness, bottleneck-audit</text>

  <rect x="860" y="110" width="230" height="210" class="stage" />
  <text x="890" y="145" class="h">Scale</text>
  <text x="890" y="180" class="s">Question: Is this a sustainable company?</text>
  <text x="890" y="205" class="s">Evidence: mature ops, enterprise readiness,</text>
  <text x="890" y="225" class="s">defensible moat, GTM system.</text>
  <text x="890" y="260" class="s">Primary skills:</text>
  <text x="890" y="282" class="s">scale-moat-system, bottleneck-audit</text>

  <rect x="95" y="370" width="1000" height="70" class="gate" />
  <text x="125" y="398" class="h">Gate rule</text>
  <text x="125" y="424" class="s">If evidence is missing, stop and validate. If code or production systems are affected, require explicit approval and backup. If traction is ambiguous, ask the reviewer agent for a skeptical read.</text>

  <path d="M280 215 L310 215" class="arrow" />
  <path d="M550 215 L580 215" class="arrow" />
  <path d="M820 215 L850 215" class="arrow" />
</svg>
